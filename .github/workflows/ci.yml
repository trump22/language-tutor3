name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-aspnet
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run build

  selenium:
    name: Selenium end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v6

      - name: Run browser tests
        run: |
          mkdir -p TestResults/videos
          timeout 30m docker compose -f docker-compose.selenium.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from tests

      - name: Collect Docker diagnostics
        if: always()
        run: |
          mkdir -p TestResults
          docker compose -f docker-compose.selenium.yml ps -a \
            > TestResults/docker-compose-ps.txt 2>&1 || true
          docker compose -f docker-compose.selenium.yml logs \
            --no-color --timestamps \
            > TestResults/docker-compose.log 2>&1 || true

      - name: Write Selenium short summary
        if: always()
        shell: pwsh
        run: ./scripts/write-selenium-summary.ps1 -ResultsDirectory TestResults

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d TestResults/allure-results ] && [ "$(find TestResults/allure-results -type f | wc -l)" -gt 0 ]; then
            npx --yes allure-commandline generate TestResults/allure-results \
              --clean \
              --output TestResults/allure-report
          else
            echo "No Allure results were produced."
          fi

      - name: Create or update Jira bugs for failed tests
        if: failure()
        continue-on-error: true
        shell: pwsh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: ./scripts/jira-sync-failed-tests.ps1 -ResultsDirectory TestResults

      - name: Upload Selenium results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: selenium-results
          path: TestResults
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: TestResults/allure-report
          if-no-files-found: ignore

      - name: Stop test environment
        if: always()
        run: docker compose -f docker-compose.selenium.yml down -v --remove-orphans

  zap:
    name: OWASP ZAP security scan
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v6

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p TestResults/zap
          timeout 15m docker compose \
            -f docker-compose.selenium.yml \
            -f docker-compose.zap.yml \
            up \
            --build \
            --abort-on-container-exit \
            --exit-code-from zap \
            zap

      - name: Collect ZAP Docker diagnostics
        if: always()
        run: |
          mkdir -p TestResults/zap
          docker compose \
            -f docker-compose.selenium.yml \
            -f docker-compose.zap.yml \
            ps -a > TestResults/zap/docker-compose-ps.txt 2>&1 || true
          docker compose \
            -f docker-compose.selenium.yml \
            -f docker-compose.zap.yml \
            logs --no-color --timestamps > TestResults/zap/docker-compose.log 2>&1 || true

      - name: Upload ZAP security report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zap-security-report
          path: TestResults/zap
          if-no-files-found: ignore

      - name: Stop ZAP test environment
        if: always()
        run: |
          docker compose \
            -f docker-compose.selenium.yml \
            -f docker-compose.zap.yml \
            down -v --remove-orphans
