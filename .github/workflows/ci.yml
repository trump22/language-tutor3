name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-aspnet
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run build

  selenium:
    name: Selenium end-to-end
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v6

      - name: Run browser tests
        run: |
          mkdir -p TestResults
          timeout 15m docker compose -f docker-compose.selenium.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from tests

      - name: Collect Docker diagnostics
        if: always()
        run: |
          mkdir -p TestResults
          docker compose -f docker-compose.selenium.yml ps -a \
            > TestResults/docker-compose-ps.txt 2>&1 || true
          docker compose -f docker-compose.selenium.yml logs \
            --no-color --timestamps \
            > TestResults/docker-compose.log 2>&1 || true

      - name: Upload Selenium results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: selenium-results
          path: TestResults
          if-no-files-found: ignore

      - name: Stop test environment
        if: always()
        run: docker compose -f docker-compose.selenium.yml down -v --remove-orphans
