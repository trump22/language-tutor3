name: Deploy Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy combined React and ASP.NET app
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Build React frontend
        working-directory: frontend-react
        env:
          VITE_API_BASE_URL: /api
        run: |
          npm ci
          npm run build

      - name: Copy React build into ASP.NET wwwroot
        run: |
          rm -rf backend-aspnet/wwwroot
          mkdir -p backend-aspnet/wwwroot
          cp -R frontend-react/dist/. backend-aspnet/wwwroot/

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish ASP.NET application
        working-directory: backend-aspnet
        run: |
          dotnet restore
          dotnet publish languagetutor.csproj \
            --configuration Release \
            --no-restore \
            --output ../publish

      - name: Verify deployment package
        run: |
          test -f publish/languagetutor.dll
          test -f publish/wwwroot/index.html

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_339C01D3E70A4093A174081D06FBB04C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D5A69B8957C44651A80C1CC94B0D3EBA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B081B193D7E04D98A6AA84FA3CCC4056 }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: language-tutor3
          slot-name: Production
          package: publish
