name: Deploy Azure App Service

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy combined React and ASP.NET app
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://${{ vars.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Validate Azure deployment settings
        env:
          AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          set -euo pipefail

          if [ -z "$AZURE_WEBAPP_NAME" ]; then
            echo "::error::Missing repository variable AZURE_WEBAPP_NAME."
            exit 1
          fi

          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "::error::Missing repository secret AZURE_WEBAPP_PUBLISH_PROFILE."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Build React frontend
        working-directory: frontend-react
        env:
          VITE_API_BASE_URL: /api
        run: |
          npm ci
          npm run build

      - name: Copy React build into ASP.NET wwwroot
        run: |
          rm -rf backend-aspnet/wwwroot
          mkdir -p backend-aspnet/wwwroot
          cp -R frontend-react/dist/. backend-aspnet/wwwroot/

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish ASP.NET application
        working-directory: backend-aspnet
        run: |
          dotnet restore
          dotnet publish languagetutor.csproj \
            --configuration Release \
            --no-restore \
            --output ../publish

      - name: Verify deployment package
        run: |
          test -f publish/languagetutor.dll
          test -f publish/wwwroot/index.html

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
