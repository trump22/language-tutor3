services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: languagetutor_test
      POSTGRES_USER: languagetutor
      POSTGRES_PASSWORD: selenium_test_password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U languagetutor -d languagetutor_test"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend-aspnet
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Database=languagetutor_test;Username=languagetutor;Password=selenium_test_password
      Jwt__Key: Selenium_Test_Jwt_Key_At_Least_Thirty_Two_Characters_Long
      Gemini__ApiKey: selenium-does-not-call-gemini
      Azure__SpeechKey: selenium-does-not-call-azure
      Azure__SpeechRegion: eastus
      Seed__AdminEmail: admin@gmail.com
      Seed__AdminPassword: Abc@123
      Seed__AdminName: Selenium Admin
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  frontend:
    build:
      context: ./frontend-react
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  selenium:
    image: selenium/standalone-chromium:latest
    shm_size: 2gb
    environment:
      SE_RECORD_VIDEO: "true"
      SE_VIDEO_FILE_NAME: "auto"
      SE_VIDEO_SESSION_SUBFOLDER: "false"
      SE_RETAIN_ON_FAILURE: "false"
      SE_NODE_GRID_URL: http://selenium:4444
      SE_NODE_PORT: "4444"
      SE_VIDEO_RECORD_STANDALONE: "true"
    ports:
      - "4444:4444"
      - "7900:7900"
    volumes:
      - ./TestResults/videos:/videos
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4444/wd/hub/status | grep -q '\"ready\": true'"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  tests:
    build:
      context: ./tests/LanguageTutor.E2E
    depends_on:
      frontend:
        condition: service_healthy
      selenium:
        condition: service_healthy
    environment:
      E2E_BASE_URL: http://frontend
      SELENIUM_REMOTE_URL: http://selenium:4444/wd/hub
      E2E_HEADLESS: "false"
      E2E_RECORD_VIDEO: "true"
      E2E_SCREENSHOT_DIR: /test-results/screenshots
      E2E_ADMIN_EMAIL: admin@gmail.com
      E2E_ADMIN_PASSWORD: Abc@123
      JIRA_BASE_URL: ${JIRA_BASE_URL:-https://your-jira-domain.atlassian.net}
    volumes:
      - ./TestResults:/test-results
